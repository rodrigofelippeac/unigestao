<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Workshop — Comunicação e Oratória</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --azul: #224976;
      --azul-dark: #1a3a5c;
      --amarelo: #FBB724;
      --laranja: #EB802A;
      --cinza: #96A2AF;
      --branco: #FBFBFC;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #c8c8c8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .banner {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      background: var(--branco);
    }

    /* ===================== TOP BAR ===================== */
    .top-bar {
      background: var(--azul);
      padding: 28px 50px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    .top-bar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--amarelo) 0%, var(--amarelo) 50%, var(--laranja) 50%, var(--laranja) 100%);
    }

    .uni-logo img {
      height: 70px;
      filter: brightness(0) invert(1);
    }

    .badge {
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      text-transform: uppercase;
      padding: 8px 28px;
      border-radius: 6px;
    }

    /* ===================== HERO SECTION ===================== */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }

    /* Left: Title block */
    .hero-text {
      background: var(--azul);
      padding: 45px 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* subtle texture */
    .hero-text::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 200px;
      height: 200px;
      border: 30px solid rgba(255,255,255,0.03);
      border-radius: 50%;
    }

    .title {
      font-size: 52px;
      font-weight: 900;
      color: var(--amarelo);
      line-height: 1.05;
      text-transform: uppercase;
      margin-bottom: 16px;
      position: relative;
    }

    .subtitle {
      font-size: 18px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      line-height: 1.5;
      position: relative;
    }

    /* Right: Speakers photos */
    .hero-photos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      position: relative;
    }

    .speaker-slot {
      position: relative;
      overflow: hidden;
    }

    .speaker-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .speaker-slot .speaker-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 14px;
      background: linear-gradient(to top, rgba(26,58,92,0.92) 0%, transparent 100%);
    }

    .speaker-overlay .name {
      font-size: 15px;
      font-weight: 700;
      color: white;
      display: block;
      line-height: 1.2;
    }

    .speaker-overlay .role {
      font-size: 11px;
      font-weight: 500;
      color: var(--amarelo);
      letter-spacing: 0.5px;
    }

    /* Color accent strip between photos */
    .speaker-slot:first-child {
      border-right: 3px solid var(--amarelo);
    }

    /* ===================== INFO BAR ===================== */
    .info-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
    }

    .info-item {
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      text-align: center;
    }

    .info-item:nth-child(1) {
      background: var(--azul);
    }
    .info-item:nth-child(2) {
      background: var(--amarelo);
      color: var(--azul-dark);
    }
    .info-item:nth-child(3) {
      background: var(--laranja);
    }

    .info-item svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .info-item:nth-child(1) svg { fill: var(--amarelo); }
    .info-item:nth-child(2) svg { fill: var(--azul-dark); }
    .info-item:nth-child(3) svg { fill: white; }

    /* ===================== BOTTOM SECTION ===================== */
    .bottom {
      padding: 16px 40px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--branco);
      gap: 16px;
    }

    /* Investment + CTA */
    .bottom-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .price-block {
      display: flex;
      flex-direction: column;
    }

    .price-value {
      font-size: 24px;
      font-weight: 900;
      color: var(--azul);
    }

    .price-detail {
      font-size: 11px;
      font-weight: 600;
      color: var(--cinza);
      margin-top: 2px;
    }

    .cta-btn {
      background: linear-gradient(135deg, var(--amarelo), var(--laranja));
      color: white;
      font-size: 13px;
      font-weight: 800;
      padding: 14px 30px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(235,128,42,0.3);
      white-space: nowrap;
    }

    /* QR Code */
    .qr-block {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .qr-img {
      width: 100px;
      height: 100px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid rgba(34,73,118,0.08);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .qr-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .qr-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--cinza);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Partners row */
    .partners-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .partner-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .partner-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--azul);
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(34,73,118,0.08);
      padding: 4px 10px;
      border-radius: 4px;
    }

    .partner-logo {
      height: 30px;
    }

    .partner-logo.uni-main {
      height: 50px;
    }

    .partner-logo img {
      height: 100%;
      object-fit: contain;
    }

    .partner-logo.dark img {
      filter: brightness(0.2);
    }

    .partner-sep {
      width: 1px;
      height: 20px;
      background: rgba(34,73,118,0.12);
    }
  </style>
</head>
<body>

  <div class="banner">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="uni-logo">
        <img src="logo-horizontal.png" alt="UNI Gestão de Pessoas">
      </div>
      <div class="badge">Workshop</div>
    </div>

    <!-- HERO: Title + Speaker Photos -->
    <div class="hero">
      <div class="hero-text">
        <h1 class="title">Comuni&shy;cação e Oratória</h1>
        <p class="subtitle">Aprenda técnicas para<br>falar em público</p>
        <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
          <div class="cta-btn">Inscreva-se</div>
          <div style="width: 150px; height: 150px; border-radius: 14px; overflow: hidden; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 4px 16px rgba(0,0,0,0.15);">
            <img src="QRCode.jpeg" alt="QR Code" style="width:100%;height:100%;object-fit:contain;">
          </div>
        </div>
      </div>

      <div class="hero-photos">
        <div class="speaker-slot">
          <img src="DioneSantosOK.jpeg" alt="Dione Santos" style="object-position: center 15%;">
          <div class="speaker-overlay">
            <span class="name">Dione Santos</span>
            <span class="role">Palestrante</span>
          </div>
        </div>
        <div class="speaker-slot">
          <img src="GleicieleFoto.jpeg" alt="Gleiciele Rodrigues" style="object-position: 25% 15%;">
          <div class="speaker-overlay">
            <span class="name">Gleiciele Rodrigues</span>
            <span class="role">Palestrante</span>
          </div>
        </div>
      </div>
    </div>

    <!-- INFO BAR: Date / Time / Location -->
    <div class="info-bar">
      <div class="info-item">
        <svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        18 de abril de 2026
      </div>
      <div class="info-item">
        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
        08:00 às 12:00
      </div>
      <div class="info-item">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        Auditório Hubee — Favoo Faculdade
      </div>
    </div>

    <!-- BOTTOM: Price + QR + Partners -->
    <div class="bottom">
      <div class="bottom-left">
        <div class="price-block">
          <span class="price-value">R$ 159,90</span>
          <span class="price-detail">em até 2x no cartão de crédito</span>
        </div>
      </div>

      <div class="partners-row">
        <div class="partner-group">
          <span class="partner-label">Realização</span>
          <div class="partner-logo uni-main">
            <img src="logo-horizontal.png" alt="UNI Gestão de Pessoas">
          </div>
        </div>
        <div class="partner-sep"></div>
        <div class="partner-group">
          <span class="partner-label">Apoio</span>
          <div class="partner-logo">
            <img src="favoo-logo-color.svg" alt="Favoo">
          </div>
          <div class="partner-logo">
            <img src="hubee-logo-color.svg" alt="Hubee">
          </div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
