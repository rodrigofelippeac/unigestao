# Nginx config para uni.gleetalentos.com.br
# Arquivo: /etc/nginx/sites-available/unigestao
# SSL gerenciado pelo Certbot (Let's Encrypt)

server {
    server_name uni.gleetalentos.com.br;

    root /var/www/unigestao;
    index index.html;

    # SPA com HashRouter — tudo vai para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Desabilitar logs de acesso para health checks
    location = /favicon.ico { log_not_found off; access_log off; }

    # SSL — managed by Certbot
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/uni.gleetalentos.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uni.gleetalentos.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP → HTTPS — managed by Certbot
server {
    listen 80;
    server_name uni.gleetalentos.com.br;
    return 301 https://$host$request_uri;
}

